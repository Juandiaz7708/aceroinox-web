<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotiza con nosotros - Aceroinox RD</title>
  <link rel="stylesheet" href="CSS/styles.css">
  <link rel="stylesheet" href="CSS/header.css">
  <link rel="stylesheet" href="CSS/formularios.css">
  <link rel="stylesheet" href="CSS/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Botón volver fijo -->
<a href="index.html" class="btn-volver">← Volver</a>

<header class="header">
  <div class="header-contenido">

    <!-- Título -->
    <div class="hero-contenido">
      <h1>Solicita tu cotización</h1>
    </div>
    
    <!-- Botón hamburguesa (móvil) -->
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>

    <!-- Botones de navegación -->
    <div class="acciones-header">
      <a href="quienes-somos.html" class="btn-header">Quiénes somos</a>
      <a href="index.html#categorias" class="btn-header">Proyectos</a>
      <a href="index.html#servicios" class="btn-header">Servicios</a>
    </div>

  </div>
</header>

<section class="contenido">
  <h2>Formulario de cotización</h2>
  <form id="formularioContacto">
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Correo" required>
    <textarea placeholder="Describe tu proyecto" required></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 Aceroinox RD &mdash; Todos los derechos reservados</p>
</footer>

<script src="script.js"></script>
</body>
</html>
